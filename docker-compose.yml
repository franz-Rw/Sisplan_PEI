version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sisplan_db
    environment:
      POSTGRES_DB: sisplan_db
      POSTGRES_USER: sisplan_user
      POSTGRES_PASSWORD: sisplan_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sisplan_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sisplan_backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://sisplan_user:sisplan_password@postgres:5432/sisplan_db
      JWT_SECRET: dev_secret_change_in_production
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sisplan_frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
